{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="alert alert-info">
        <h2>Admin Dashboard</h2>
        <p>Welcome Admin {{ user.username }}!</p>
        <p>Email: {{ user.email }}</p>
        <p>Role: {{ user.role }}</p>
    </div>
    <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
</div>
{% endblock %}
