{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-gradient-primary text-white">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <i class="fas fa-user-circle fa-2x"></i>
                            <h3 class="d-inline-block ms-3 mb-0">Customer Dashboard</h3>
                        </div>
                        <div>
                            <span class="badge bg-light text-dark">
                                <i class="fas fa-user"></i> {{ user.username }}
                            </span>
                        </div>
                    </div>
                </div>
                <div class="card-body bg-gradient-dark">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="info-card">
                                <i class="fas fa-user fa-2x text-primary"></i>
                                <h5>Profile Info</h5>
                                <p><strong>Name:</strong> {{ user.username }}</p>
                                <p><strong>Email:</strong> {{ user.email }}</p>
                                <p><strong>Phone:</strong> {{ user.phone|default:"Not provided" }}</p>
                                <p><strong>Role:</strong> {{ user.role }}</p>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="info-card">
                                <i class="fas fa-ticket-alt fa-2x text-success"></i>
                                <h5>Quick Actions</h5>
                                <a href="/bookings/booking-history/" class="btn btn-info w-100 mb-2">
                                    <i class="fas fa-history"></i> My Bookings
                                </a>
                                <a href="/" class="btn btn-primary w-100 mb-2">
                                    <i class="fas fa-film"></i> Browse Movies
                                </a>
                                <a href="{% url 'logout' %}" class="btn btn-danger w-100">
                                    <i class="fas fa-sign-out-alt"></i> Logout
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .bg-gradient-primary {
        background: linear-gradient(135deg, #667eea, #764ba2);
    }
    
    .bg-gradient-dark {
        background: linear-gradient(135deg, #1a1a2e, #16213e);
    }
    
    .info-card {
        background: rgba(255,255,255,0.1);
        border-radius: 15px;
        padding: 20px;
        color: white;
        height: 100%;
    }
    
    .info-card h5 {
        margin: 15px 0 15px;
        color: #ffc107;
    }
    
    .info-card p {
        margin-bottom: 8px;
        color: rgba(255,255,255,0.8);
    }
</style>
{% endblock %}
