{% extends 'tickets/base.html' %}
{% block title %}Register — CineBook{% endblock %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="booking-card p-4">
      <h3 class="text-center mb-4 fw-bold" style="color:#e94560;">Create Account</h3>
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
          <label class="form-label text-muted">{{ field.label }}</label>
          <input type="{{ field.field.widget.input_type }}"
                 name="{{ field.html_name }}"
                 class="form-control bg-dark text-light border-secondary"
                 {% if field.value %}value="{{ field.value }}"{% endif %}>
          {% if field.errors %}
            <div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>
          {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary w-100 mt-2">Register</button>
      </form>
      <p class="text-center text-muted mt-3 small">
        Already have an account? <a href="{% url 'login' %}" style="color:#e94560;">Login</a>
      </p>
    </div>
  </div>
</div>

{% endblock %}
