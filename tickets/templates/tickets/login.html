{% extends 'tickets/base.html' %}
{% block title %}Login — CineBook{% endblock %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="booking-card p-4">
      <h3 class="text-center mb-4 fw-bold" style="color:#e94560;">Login</h3>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label text-muted">Username</label>
          <input type="text" name="username" class="form-control bg-dark text-light border-secondary">
        </div>
        <div class="mb-3">
          <label class="form-label text-muted">Password</label>
          <input type="password" name="password" class="form-control bg-dark text-light border-secondary">
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>
      <p class="text-center text-muted mt-3 small">
        No account? <a href="{% url 'register' %}" style="color:#e94560;">Register here</a>
      </p>
    </div>
  </div>
</div>

{% endblock %}
