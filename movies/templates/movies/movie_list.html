{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <h1>Now Showing</h1>
    
    {% for movie in movies %}
    <div class="card mb-3">
        <div class="card-body">
            <h3>{{ movie.title }}</h3>
            <p>{{ movie.genre }} | {{ movie.duration_minutes }} mins</p>
            <a href="#" class="btn btn-primary">Book Now</a>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
